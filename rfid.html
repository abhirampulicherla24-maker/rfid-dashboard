<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Vehicle Gate Security Dashboard</title>
    <meta name="description" content="Real-time RFID Access Control Dashboard.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="glass-panel" style="padding: 1.5rem;">
            <div class="brand-section">
                <h1><i data-lucide="shield-check" class="brand-icon"></i> RFID Gate Control</h1>
                <p>Real-time vehicle authorization logging via WebSocket</p>
            </div>
            
            <div class="controls-section">
                <div style="display: flex; gap: 0.5rem; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); padding: 0.35rem 0.75rem; border-radius: 0.75rem;">
                    <i data-lucide="network" style="width: 16px; height: 16px; color: var(--text-secondary);"></i>
                    <input type="text" id="wsAddressInput" class="input-text" style="max-width: 200px; font-family: var(--font-mono); border: none; padding: 0.25rem 0.5rem; background: transparent;" placeholder="ws://10.101.0.97:8765">
                    <button id="btnWsConnect" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 0.375rem;">Connect</button>
                </div>
                <div id="connectionStatusBadge" class="status-badge"><span class="dot"></span><span id="connectionStatusText">Disconnected</span></div>
            </div>
        </header>

        <section class="stats-grid">
            <div class="glass-panel stat-card primary"><div class="stat-label"><i data-lucide="car-front"></i> Total Scans</div><div id="statTotalEntered" class="stat-value">0</div></div>
            <div class="glass-panel stat-card success"><div class="stat-label"><i data-lucide="check-circle"></i> Granted</div><div id="statAccessGranted" class="stat-value">0</div></div>
            <div class="glass-panel stat-card danger"><div class="stat-label"><i data-lucide="x-circle"></i> Denied</div><div id="statAccessDenied" class="stat-value">0</div></div>
            <div class="glass-panel stat-card"><div class="stat-label"><i data-lucide="percent"></i> Success Rate</div><div id="statApprovalRate" class="stat-value">0%</div></div>
        </section>

        <main class="dashboard-grid">
            
            <section class="left-column">
                <article class="glass-panel" style="height: 100%;">
                    <h2 class="panel-title"><span>Gate Monitor</span></h2>
                    <div class="panel-content">
                        <div id="gateVisualizer" class="gate-visualizer gate-state-closed">
                            <svg class="gate-svg" viewBox="0 0 240 180">
                                <defs>
                                    <pattern id="gate-stripes" width="40" height="40" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                                        <rect x="0" y="0" width="20" height="40" fill="#EF4444"></rect>
                                        <rect x="20" y="0" width="20" height="40" fill="#FFFFFF"></rect>
                                    </pattern>
                                </defs>
                                <line x1="10" y1="150" x2="230" y2="150" stroke="#4B5563" stroke-width="3"/>
                                <rect class="gate-post" x="185" y="90" width="30" height="60" rx="3"/>
                                <rect class="gate-arm" x="25" y="111" width="175" height="8" rx="2"/>
                                <circle class="gate-hinge" cx="200" cy="115" r="8"/>
                            </svg>
                            <div class="gate-status-label" id="gateStatusContainer">
                                <i data-lucide="lock" id="gateLockIcon"></i><span id="gateStatusText">CLOSED</span>
                            </div>
                        </div>
                    </div>
                </article>
            </section>

            <section class="main-dashboard-content">
                <article class="glass-panel logs-panel" style="height: 100%;">
                    <h2 class="panel-title"><span>Live Log Activity</span><button id="btnClearLogs" class="btn btn-danger" style="font-size:0.8rem; padding:0.4rem;">Clear</button></h2>
                    <div class="panel-content">
                        <div class="table-wrapper">
                            <table>
                                <thead><tr><th>Time</th><th>UID</th><th>Status</th></tr></thead>
                                <tbody id="logsTableBody"></tbody>
                            </table>
                            <div id="logsEmptyState" class="empty-state"><p>No scans recorded yet.</p></div>
                        </div>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
</body>
</html>
